version: "3.9"

services:
  db:
    image: postgres:16
    container_name: lotoanalyzer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: lotoanalyzer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/scripts.sql:/docker-entrypoint-initdb.d/01-scripts.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lotoanalyzer"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lotoanalyzer-backend
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/lotoanalyzer
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SERVER_PORT: 8080
    ports:
      - "8080:8080"

volumes:
  postgres_data:
